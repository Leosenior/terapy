<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Terapia - tracker cloud</title>
  <style>
    :root{
      --bg:#eef4ff;
      --bg2:#ffffff;
      --ink:#14213d;
      --muted:#6d7a98;
      --line:#d8e1f0;
      --soft:#edf3ff;
      --navy:#203a8f;
      --navy2:#3e63dd;
      --teal:#0ea5a8;
      --green:#16a34a;
      --red:#ef4444;
      --shadow:0 8px 20px rgba(31,55,110,.10);
      --shadow2:0 4px 10px rgba(31,55,110,.06);
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:linear-gradient(180deg,#eef4ff 0%,#f7f9ff 28%,#ffffff 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    body{min-height:100vh}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:0;background:transparent;color:inherit}
    .app{max-width:500px;margin:0 auto;padding:10px 8px 20px}
    .shell{background:rgba(255,255,255,.82);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.7);border-radius:24px;box-shadow:var(--shadow);padding:10px}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;padding:2px 0 0}
    h1{font-size:24px;line-height:1;margin:0 0 2px;font-weight:950;letter-spacing:-.05em}
    .sub{color:var(--muted);font-weight:800;font-size:12px;display:flex;flex-wrap:wrap;align-items:center;gap:6px}
    .prese-oggi{background:var(--navy2);color:#fff;padding:1px 10px;border-radius:12px;font-weight:900;font-size:11px;white-space:nowrap;display:inline-block}
    .sync-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:900;margin-left:4px;vertical-align:middle;letter-spacing:.03em;white-space:nowrap}
    .sync-badge.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
    .sync-badge.off{background:#fef3c7;color:#854d0e;border:1px solid #fcd34d}
    .sync-badge.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
    .sync-badge.syncing{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
    .tabs{display:flex;gap:3px;padding:3px;border-radius:14px;background:linear-gradient(180deg,#f9fbff,#edf2ff);border:1px solid var(--line);box-shadow:var(--shadow2);overflow-x:auto}
    .tab{padding:6px 10px;border-radius:10px;color:var(--muted);font-weight:900;font-size:11px;white-space:nowrap;transition:.15s ease}
    .tab.active{background:linear-gradient(135deg,var(--navy),var(--navy2));color:white;box-shadow:0 6px 12px rgba(62,99,221,.25)}
    .weeknav{display:grid;grid-template-columns:32px 1fr 32px;align-items:center;gap:6px;margin-bottom:8px}
    .square{height:32px;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;background:linear-gradient(180deg,#fff,#f2f6ff);box-shadow:var(--shadow2);transition:.15s ease}
    .range{text-align:center;font-size:13px;font-weight:950;letter-spacing:-.02em;cursor:pointer;padding:2px 0;border-radius:8px;transition:background .15s}
    .range:hover{background:var(--soft)}
    .range small{font-size:11px;color:var(--navy2);font-weight:900;margin-left:3px}
    .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
    .daychip{height:44px;border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff,#f5f8ff);color:#57627c;font-weight:900;box-shadow:var(--shadow2);transition:.15s ease}
    .daychip .dn{font-size:9px;margin-bottom:1px}
    .daychip .dd{font-size:16px;line-height:1;color:var(--ink);letter-spacing:-.05em}
    .daychip.active{background:linear-gradient(135deg,var(--navy),var(--navy2));border-color:transparent;color:#d9e4ff;transform:translateY(-1px);box-shadow:0 8px 14px rgba(62,99,221,.25)}
    .daychip.active .dd{color:white}
    .daychip.today:not(.active){border-color:#a6c0ff;background:linear-gradient(180deg,#ffffff,#eef4ff)}
    .daytitle{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;padding:0}
    .daytitle h2{font-size:18px;line-height:1.05;margin:0;font-weight:950;letter-spacing:-.04em}
    .daytitle h2 span{display:block;color:var(--muted);font-size:13px;font-weight:850;letter-spacing:-.02em;margin-top:1px}
    .cycle{color:var(--navy2);font-weight:900;font-size:11px;white-space:nowrap;background:#edf3ff;border:1px solid #d7e3ff;border-radius:10px;padding:4px 8px}
    .section{margin:0 0 10px}
    .section h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:950;margin:0 0 5px;padding-left:2px}
    .empty{border:1px dashed var(--line);border-radius:12px;padding:10px;color:var(--muted);font-weight:800;background:var(--soft);font-size:12px}
    .card{display:flex;align-items:center;gap:8px;min-height:42px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#ffffff,#f9fbff);padding:6px 10px;margin:0 0 4px;box-shadow:var(--shadow2);transition:.15s ease}
    .card.taken{background:linear-gradient(180deg,#f1fbf4,#ecf9f0);border-color:#b6e3c5}
    .card.taken .name,.card.taken .dose{text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:#59996f;color:#557162}
    .card.taken .note{color:#64806f}
    .check{width:22px;height:22px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex:0 0 auto;background:#fff;color:white;font-size:14px;font-weight:900;transition:.15s ease}
    .taken .check{background:linear-gradient(135deg,var(--green),#22c55e);border-color:transparent;box-shadow:0 4px 8px rgba(34,197,94,.2)}
    .txt{min-width:0;flex:1}
    .line1{display:flex;flex-wrap:wrap;gap:4px;align-items:baseline;font-size:15px;line-height:1.1;font-weight:950;letter-spacing:-.03em}
    .dose{color:var(--navy2);font-weight:850}
    .note{margin-top:2px;color:var(--muted);font-size:10px;font-weight:850;line-height:1.2}
    .warn{background:linear-gradient(180deg,#fff7e8,#fff2cc);border:1px solid #f4dd97;color:#765300;border-radius:12px;padding:8px 10px;font-weight:800;line-height:1.3;margin:0 0 10px;font-size:11px}
    .panel{display:none}
    .panel.active{display:block}
    .formtop{display:grid;gap:8px;margin-bottom:10px}
    .field{display:grid;gap:4px}
    label{font-weight:850;color:var(--muted);font-size:11px;letter-spacing:.02em}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:6px 8px;background:#fff;color:var(--ink);font-weight:750;outline:none;box-shadow:inset 0 1px 2px rgba(0,0,0,.02);font-size:12px}
    input:focus,select:focus,textarea:focus{border-color:#95b4ff;box-shadow:0 0 0 3px rgba(62,99,221,.10)}
    textarea{min-height:80px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;font-weight:600}
    .toolbar{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 10px}
    .pillbtn{border:1px solid var(--line);border-radius:10px;padding:5px 8px;font-weight:850;background:linear-gradient(180deg,#fff,#f7faff);color:var(--ink);box-shadow:var(--shadow2);font-size:10px}
    .pillbtn.dark{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-color:transparent}
    .pillbtn.red{background:linear-gradient(135deg,var(--red),#ef4444);color:#fff;border-color:transparent}
    .med-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
    .med-icon{width:80px;min-height:80px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:12px;box-shadow:var(--shadow2);transition:.2s ease;cursor:pointer;text-align:center;padding:6px 4px;border:1px solid transparent;line-height:1.2;word-break:break-word}
    .med-icon .abbr{font-size:20px;line-height:1;margin-bottom:2px;font-weight:950}
    .med-icon .dose-small{font-size:9px;opacity:.85;margin-top:1px}
    .med-icon .count{background:rgba(255,255,255,.15);border-radius:10px;padding:0 6px;font-size:8px;margin-top:2px}
    .med-icon .fullname{font-size:10px;font-weight:800;line-height:1.1;max-width:100%;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-top:2px}
    .med-icon:hover{transform:scale(1.04);box-shadow:0 8px 16px rgba(62,99,221,.25)}
    .hide{display:none!important}
    
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
      padding: 14px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #fff; border-radius: 18px; padding: 18px;
      max-width: 460px; width: 100%; box-shadow: var(--shadow);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-content h2 { margin: 0 0 12px; font-size: 18px; font-weight: 900; letter-spacing: -0.04em; }
    .modal-footer { display: flex; gap: 6px; margin-top: 14px; }
    .modal-footer button { flex: 1; padding: 8px; border-radius: 10px; font-weight: 850; font-size:12px; }
    .btn-cancel { background: var(--soft); color: var(--muted); }
    .btn-confirm { background: var(--navy); color: #fff; }
    .form-grid { display: grid; gap: 10px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .slot-checks { display: flex; gap: 6px; margin-top: 3px; }
    .slot-check { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 5px; font-size: 10px; font-weight: 850; text-align: center; background:#fff; }
    .slot-check.on { background: var(--navy2); color: #fff; border-color: transparent; }

    .modal-list { display: grid; gap: 5px; margin-top: 6px; }
    .modal-list-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border: 1px solid var(--line); border-radius: 10px;
      background: var(--soft); font-weight: 850; font-size:12px;
    }
    .modal-list-item button { color: var(--red); font-weight: 950; font-size: 10px; border: 1px solid var(--red); border-radius: 6px; padding: 2px 6px; background: #fff; }

    .history-item {
      padding: 8px 10px; border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-item:last-child { border: 0; }
    .history-date { font-weight: 900; font-size: 12px; color: var(--navy); }
    .history-details { font-size: 11px; color: var(--muted); font-weight: 750; }

    .date-popup {
      display: none;
      position: absolute;
      background: white;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      box-shadow: var(--shadow);
      z-index: 500;
      width: 220px;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 4px;
    }
    .date-popup.open { display: block; }
    .date-popup input[type="date"] {
      width: 100%;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid var(--line);
      font-weight: 800;
      font-size: 13px;
    }
    .date-popup .actions {
      display: flex;
      gap: 5px;
      margin-top: 6px;
    }
    .date-popup .actions button {
      flex: 1;
      padding: 5px;
      border-radius: 6px;
      font-weight: 850;
      font-size: 11px;
      border: 1px solid var(--line);
      background: var(--soft);
    }
    .date-popup .actions button.primary {
      background: var(--navy);
      color: #fff;
      border-color: transparent;
    }
    .range-wrap { position: relative; display: inline-block; }

    .daysedit{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:3px}
    .daycheck{border:1px solid var(--line);border-radius:6px;text-align:center;padding:4px 0;font-size:10px;font-weight:900;color:var(--muted);user-select:none;background:#fff}
    .daycheck.on{background:linear-gradient(135deg,var(--navy),var(--navy2));border-color:transparent;color:#fff;box-shadow:0 4px 8px rgba(62,99,221,.15)}

    @media (max-width:420px){
      .app{padding:8px 6px 16px}
      .shell{padding:8px;border-radius:20px}
      h1{font-size:20px}
      .tabs{padding:2px}.tab{padding:5px 8px;font-size:10px}
      .med-icon{width:70px;min-height:70px;font-size:10px}
      .med-icon .abbr{font-size:16px}
      .med-icon .fullname{font-size:9px}
      .days{gap:3px}.daychip{height:38px;border-radius:8px}.daychip .dd{font-size:14px}
      .card{padding:4px 8px;min-height:34px}.line1{font-size:13px}
      .grid2{grid-template-columns:1fr}
      .cycle{font-size:10px;padding:3px 6px}
      .daytitle h2{font-size:16px}
      .daytitle h2 span{font-size:12px}
      .date-popup{width:180px;left:0;transform:none}
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <section class="top">
        <div>
          <h1>Terapia <span id="syncBadge" class="sync-badge off">⏳ Connessione...</span></h1>
          <div class="sub">
            <span id="startText"></span>
            <span class="prese-oggi" id="preseOggiBadge">Prese oggi: 0/0 (0%)</span>
          </div>
        </div>
        <div class="tabs" role="tablist">
          <button class="tab active" id="tabWeek">Settimana</button>
          <button class="tab" id="tabMeds">Farmaci</button>
          <button class="tab" id="tabHistory">Storico</button>
        </div>
      </section>

      <section id="weekPanel" class="panel active">
        <div class="weeknav">
          <button class="square" id="prevWeek">←</button>
          <div class="range-wrap">
            <div class="range" id="weekRange">⬇️</div>
            <div class="date-popup" id="datePopup">
              <input type="date" id="datePicker" />
              <div class="actions">
                <button onclick="closeDatePopup()">Annulla</button>
                <button class="primary" onclick="jumpToDate()">Vai</button>
              </div>
            </div>
          </div>
          <button class="square" id="nextWeek">→</button>
        </div>
        <div class="days" id="days"></div>
        <div class="daytitle">
          <h2 id="dayTitle"></h2>
          <div class="cycle" id="cycleText"></div>
        </div>
        <div id="sections"></div>
      </section>

      <section id="medsPanel" class="panel">
        <div class="warn">App sincronizzata su tutti i dispositivi. Non sostituisce medico o farmacista.</div>
        <div class="formtop">
          <div class="grid2">
            <div class="field">
              <label>Data inizio ciclo globale</label>
              <input type="date" id="startDate" />
            </div>
            <div class="field">
              <label>Durata ciclo globale (opzionale)</label>
              <div style="display:flex; gap:5px;">
                <input type="number" id="cycleDuration" value="" placeholder="∞" style="flex:1" />
                <select id="cycleUnit" style="flex:1">
                  <option value="days">Giorni</option>
                  <option value="weeks">Settimane</option>
                  <option value="months">Mesi</option>
                  <option value="years">Anni</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="toolbar">
          <button class="pillbtn dark" id="addMedBtn">+ Aggiungi</button>
          <button class="pillbtn red" id="removeMedBtn">Rimuovi</button>
          <button class="pillbtn" id="exportBtn">Export JSON</button>
          <button class="pillbtn" id="importBtn">Import JSON</button>
          <button class="pillbtn" id="resetBtn">Reset</button>
        </div>
        <div class="field hide" id="jsonBoxWrap">
          <label>JSON backup / import</label>
          <textarea id="jsonBox" spellcheck="false"></textarea>
        </div>
        <div id="medGrid" class="med-grid"></div>
      </section>

      <section id="historyPanel" class="panel">
        <div class="warn">Database storico delle somministrazioni registrate.</div>
        <div id="historyList" class="shell" style="padding:0; overflow:hidden; border-radius:16px;"></div>
      </section>
    </div>
  </main>

  <!-- Modal unico per creazione e modifica -->
  <div id="medModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Nuovo Farmaco</h2>
      <div class="form-grid">
        <div class="field">
          <label>Nome farmaco</label>
          <input type="text" id="mName" placeholder="es. Creatina">
        </div>
        <div class="form-row">
          <div class="field">
            <label>Data Inizio</label>
            <input type="date" id="mStartDate">
          </div>
          <div class="field">
            <label>Data Fine (opzionale)</label>
            <input type="date" id="mEndDate">
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Dose Totale Iniziale (es. 1g)</label>
            <input type="text" id="mDoseInit" placeholder="1g">
          </div>
          <div class="field">
            <label>Operazione Rampa</label>
            <select id="mOp">
              <option value="none">Nessuna (dose fissa)</option>
              <option value="add">Aumenta (+)</option>
              <option value="sub">Sottrai (-)</option>
            </select>
          </div>
        </div>
        <div id="rampFields" style="display:none; gap:10px; flex-direction:column;">
          <div class="form-row">
            <div class="field">
              <label>Variazione Totale (es. 20mcg)</label>
              <input type="text" id="mStep" placeholder="20mcg">
            </div>
            <div class="field">
              <label>Limite Totale (stop)</label>
              <input type="text" id="mLimit" placeholder="es. 100mcg">
            </div>
          </div>
          <div class="field">
            <label>Frequenza variazione</label>
            <div style="display:flex; align-items:center; gap:5px;">
              Ogni <input type="number" id="mFreq" value="1" style="width:45px"> giorni
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Durata (se Data Fine vuota)</label>
            <input type="number" id="mDur" value="30">
          </div>
          <div class="field">
            <label>Unità</label>
            <select id="mUnit">
              <option value="days">Giorni</option>
              <option value="weeks">Settimane</option>
              <option value="months">Mesi</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Giorni della settimana</label>
          <div class="daysedit" id="mDays"></div>
        </div>
        <div class="field">
          <label>Suddivisione giornata (dose totale divisa tra questi)</label>
          <div class="slot-checks">
            <button class="slot-check on" data-slot="mattina">Mattina</button>
            <button class="slot-check on" data-slot="pomeriggio">Pomeriggio</button>
            <button class="slot-check on" data-slot="sera">Sera</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Annulla</button>
        <button class="btn-confirm" id="modalConfirmBtn">Conferma</button>
      </div>
    </div>
  </div>

  <!-- Modal Rimuovi Farmaco -->
  <div id="removeModal" class="modal">
    <div class="modal-content">
      <h2>Rimuovi Farmaco</h2>
      <p style="font-size:11px; color:var(--muted); font-weight:750; margin-bottom:10px;">Seleziona un farmaco per eliminare tutte le sue voci dal piano.</p>
      <div id="removeList" class="modal-list"></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeRemoveModal()">Chiudi</button>
      </div>
    </div>
  </div>

<script>
(function(){
  const STORE='therapy-tracker-local-color-ramp-v1';
  const dayNames=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
  const dayShort=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const slots=[['mattina','MATTINA'],['pomeriggio','POMERIGGIO'],['sera','SERA']];
  const slotLabels = {mattina:'Mattina', pomeriggio:'Pomeriggio', sera:'Sera'};

  const defaultState=()=>({
    startDate:isoLocal(new Date()),
    cycleDuration: null,
    cycleUnit: 'days',
    selectedDate:isoLocal(new Date()),
    meds:[],
    taken:{},
    activeTab:'week'
  });

  function med(name,dose,time,opts={}){
    return {id:uid(),name,dose,time,days:opts.days||[0,1,2,3,4,5,6],startDate:opts.startDate||'',endDate:opts.endDate||'',note:opts.note||'',enabled:opts.enabled!==false};
  }
  function uid(){return 'm'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4)}
  function pad(n){return String(n).padStart(2,'0')}
  function isoLocal(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
  function parseIso(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
  function fmtShort(d){return `${d.getDate()} ${['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'][d.getMonth()]}`}
  function fmtFull(d){return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`}
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
  function addDaysIso(iso,n){return isoLocal(addDays(parseIso(iso),n))}
  function diffDays(a,b){return Math.round((parseIso(a)-parseIso(b))/86400000)}
  function mondayOf(iso){const d=parseIso(iso);const day=(d.getDay()+6)%7;return addDays(d,-day)}
  function dayIndex(iso){return (parseIso(iso).getDay()+6)%7}
  function hashColor(str){
    let hash=0; for(let i=0;i<str.length;i++){hash=str.charCodeAt(i)+((hash<<5)-hash);}
    const hue=Math.abs(hash%360); return `hsl(${hue}, 70%, 45%)`;
  }

  function load(){
    try{const raw=localStorage.getItem(STORE); if(raw){const s=JSON.parse(raw); if(s&&Array.isArray(s.meds)) return s;}}catch(e){}
    return defaultState();
  }
  let state=load();
  state.selectedDate = isoLocal(new Date());

  function save(){
    localStorage.setItem(STORE,JSON.stringify(state));
    if (window.__therapy_onChange) window.__therapy_onChange(state);
  }

  window.__therapy_setState = function(newState){
    state = newState;
    localStorage.setItem(STORE,JSON.stringify(state));
    render();
  };
  window.__therapy_getState = function(){ return state; };
  window.__therapy_defaultState = defaultState;

  const $=id=>document.getElementById(id);
  const startText=$('startText'),weekRange=$('weekRange'),daysEl=$('days'),dayTitle=$('dayTitle'),cycleText=$('cycleText'),sections=$('sections');
  const tabWeek=$('tabWeek'),tabMeds=$('tabMeds'),tabHistory=$('tabHistory');
  const weekPanel=$('weekPanel'),medsPanel=$('medsPanel'),historyPanel=$('historyPanel');
  const preseOggiBadge=$('preseOggiBadge');
  const medGrid=$('medGrid');

  tabWeek.onclick=()=>setTab('week');
  tabMeds.onclick=()=>setTab('meds');
  tabHistory.onclick=()=>setTab('history');
  
  $('prevWeek').onclick=()=>{state.selectedDate=isoLocal(addDays(parseIso(state.selectedDate),-7));save();render();};
  $('nextWeek').onclick=()=>{state.selectedDate=isoLocal(addDays(parseIso(state.selectedDate),7));save();render();};
  $('startDate').onchange=e=>{state.startDate=e.target.value||state.startDate; save(); render();};
  $('cycleDuration').onchange=e=>{
    const val = e.target.value.trim();
    state.cycleDuration = val === '' ? null : parseInt(val);
    save(); render();
  };
  $('cycleUnit').onchange=e=>{state.cycleUnit=e.target.value; save(); render();};
  
  // Popup calendario
  const datePopup = $('datePopup');
  const datePicker = $('datePicker');
  weekRange.onclick = (e) => {
    e.stopPropagation();
    datePicker.value = state.selectedDate;
    datePopup.classList.toggle('open');
  };
  window.closeDatePopup = () => { datePopup.classList.remove('open'); };
  window.jumpToDate = () => {
    const val = datePicker.value;
    if(val){
      state.selectedDate = val;
      save(); render();
      closeDatePopup();
    }
  };
  document.addEventListener('click', (e) => {
    if(!e.target.closest('.range-wrap')) closeDatePopup();
  });

  // Modal unico per creazione/modifica
  let editingIndex = null;
  const modalTitle = $('modalTitle');
  const modalConfirmBtn = $('modalConfirmBtn');
  const mDaysContainer = $('mDays');
  let selectedModalDays = [0,1,2,3,4,5,6];

  function resetModalFields(){
    $('mName').value = '';
    $('mDoseInit').value = '';
    $('mStartDate').value = state.selectedDate;
    $('mEndDate').value = '';
    $('mOp').value = 'none';
    $('rampFields').style.display = 'none';
    $('mDur').value = '30';
    $('mUnit').value = 'days';
    $('mStep').value = '';
    $('mLimit').value = '';
    $('mFreq').value = '1';
    selectedModalDays = [0,1,2,3,4,5,6];
    mDaysContainer.querySelectorAll('.daycheck').forEach((b,i)=>{
      b.classList.toggle('on', selectedModalDays.includes(i));
    });
    document.querySelectorAll('.slot-checks .slot-check').forEach(b=>b.classList.add('on'));
    editingIndex = null;
    modalTitle.textContent = 'Nuovo Farmaco';
    modalConfirmBtn.textContent = 'Conferma';
  }

  function openCreateModal(){
    resetModalFields();
    $('medModal').classList.add('active');
  }

  function openEditModal(index){
    const med = state.meds[index];
    if(!med) return;
    editingIndex = index;
    $('mName').value = med.name;
    $('mDoseInit').value = med.dose;
    $('mStartDate').value = med.startDate || '';
    $('mEndDate').value = med.endDate || '';
    $('mOp').value = 'none';
    $('rampFields').style.display = 'none';
    $('mDur').value = '30';
    $('mUnit').value = 'days';
    // Giorni
    const daysSet = new Set(med.days || [0,1,2,3,4,5,6]);
    selectedModalDays = [0,1,2,3,4,5,6].filter(i => daysSet.has(i));
    mDaysContainer.querySelectorAll('.daycheck').forEach((b,i)=>{
      b.classList.toggle('on', daysSet.has(i));
    });
    // Slot
    const slotSet = new Set([med.time]);
    document.querySelectorAll('.slot-checks .slot-check').forEach(b=>{
      b.classList.toggle('on', slotSet.has(b.dataset.slot));
    });
    modalTitle.textContent = 'Modifica Farmaco';
    modalConfirmBtn.textContent = 'Salva modifiche';
    $('medModal').classList.add('active');
  }

  window.closeModal = () => {
    $('medModal').classList.remove('active');
    editingIndex = null;
  };

  $('addMedBtn').onclick=openCreateModal;
  $('mOp').onchange=e=>$('rampFields').style.display = (e.target.value === 'none' ? 'none' : 'flex');
  document.querySelectorAll('.slot-checks .slot-check').forEach(btn => {
    btn.onclick = () => btn.classList.toggle('on');
  });

  // Inizializza i bottoni dei giorni nel modal
  dayShort.forEach((dn, i) => {
    const b = document.createElement('button');
    b.className = 'daycheck on'; b.textContent = dn;
    b.onclick = () => {
      b.classList.toggle('on');
      const idx = selectedModalDays.indexOf(i);
      if(idx > -1) selectedModalDays.splice(idx, 1);
      else selectedModalDays.push(i);
      selectedModalDays.sort();
    };
    mDaysContainer.appendChild(b);
  });

  window.confirmMed = () => {
    const name = $('mName').value || 'Farmaco';
    const doseInitStr = $('mDoseInit').value || '1';
    const op = $('mOp').value;
    const startIso = $('mStartDate').value || state.selectedDate;
    const endIsoManual = $('mEndDate').value;
    const duration = parseInt($('mDur').value) || 30;
    const unit = $('mUnit').value;
    const selectedSlots = Array.from(document.querySelectorAll('.slot-checks .slot-check.on')).map(b => b.dataset.slot);

    if (selectedSlots.length === 0) { alert('Seleziona almeno un momento!'); return; }

    if (editingIndex !== null) {
      // Modifica: aggiorna il farmaco esistente (solo campi base, non rampa)
      const med = state.meds[editingIndex];
      med.name = name;
      med.dose = doseInitStr;
      med.startDate = startIso;
      med.endDate = endIsoManual;
      med.days = [...selectedModalDays];
      med.time = selectedSlots[0];
      save(); render(); closeModal();
      return;
    }

    // Creazione nuovo farmaco (multi-slot)
    const doseVal = parseFloat(doseInitStr.replace(/[^0-9.]/g, '')) || 0;
    const doseUnit = doseInitStr.replace(/[0-9.]/g, '').trim();

    let totalDays;
    if(endIsoManual) totalDays = diffDays(endIsoManual, startIso) + 1;
    else {
      if(unit === 'weeks') totalDays = duration * 7;
      else if(unit === 'months') totalDays = duration * 30;
      else totalDays = duration;
    }

    if(op === 'none'){
      const perSlotDose = (doseVal / selectedSlots.length).toFixed(2);
      selectedSlots.forEach(slot => {
        state.meds.push(med(name, `${perSlotDose}${doseUnit}`, slot, {
          startDate: startIso, endDate: addDaysIso(startIso, totalDays - 1),
          days: [...selectedModalDays]
        }));
      });
    } else {
      const stepValTotal = parseFloat(($('mStep').value || '0').replace(/[^0-9.]/g, '')) || 0;
      const limitValTotal = $('mLimit').value !== '' ? parseFloat($('mLimit').value.replace(/[^0-9.]/g, '')) : null;
      const freq = parseInt($('mFreq').value) || 1;

      for (let d = 0; d < totalDays; d++) {
        const currentIso = addDaysIso(startIso, d);
        if(!selectedModalDays.includes(dayIndex(currentIso))) continue;
        const increments = Math.floor(d / freq);
        let dailyTotal = op === 'add' ? doseVal + (increments * stepValTotal) : doseVal - (increments * stepValTotal);
        if (limitValTotal !== null) {
          if (op === 'add' && dailyTotal > limitValTotal) dailyTotal = limitValTotal;
          if (op === 'sub' && dailyTotal < limitValTotal) dailyTotal = limitValTotal;
        }
        const perSlotDose = (dailyTotal / selectedSlots.length).toFixed(2);
        selectedSlots.forEach(slot => {
          state.meds.push(med(name, `${perSlotDose}${doseUnit}`, slot, {
            startDate: currentIso, endDate: currentIso,
            note: `Rampa Giorno ${d+1} (Tot: ${dailyTotal.toFixed(2)}${doseUnit})`,
            days: [dayIndex(currentIso)]
          }));
        });
      }
    }
    save(); render(); closeModal();
  };

  $('removeMedBtn').onclick=()=>{
    const list = $('removeList'); list.innerHTML = '';
    const uniqueMeds = [...new Set(state.meds.map(m => m.name))].sort();
    if(uniqueMeds.length === 0){ list.innerHTML = '<div class="empty">Nessun farmaco presente.</div>'; }
    uniqueMeds.forEach(name => {
      const item = document.createElement('div'); item.className = 'modal-list-item';
      item.innerHTML = `<span>${name}</span> <button onclick="removeMedByName('${name.replace(/'/g, "\\'")}')">RIMUOVI TUTTI</button>`;
      list.appendChild(item);
    });
    $('removeModal').classList.add('active');
  };
  window.closeRemoveModal = () => $('removeModal').classList.remove('active');
  window.removeMedByName = (name) => {
    if(confirm(`Rimuovere tutte le voci per "${name}"?`)){
      state.meds = state.meds.filter(m => m.name.toLowerCase() !== name.toLowerCase());
      save(); render(); closeRemoveModal();
    }
  };

  $('resetBtn').onclick=()=>{ if(confirm('Resettare tutto?')){state=defaultState(); save(); render();} };
  $('exportBtn').onclick=()=>{const box=$('jsonBox'),wrap=$('jsonBoxWrap');wrap.classList.remove('hide');box.value=JSON.stringify(state,null,2);box.focus();box.select();};
  $('importBtn').onclick=()=>{const wrap=$('jsonBoxWrap'),box=$('jsonBox'); if(wrap.classList.contains('hide')){wrap.classList.remove('hide');return;} try{state=JSON.parse(box.value); save(); render(); alert('Import OK');}catch(e){alert('Errore JSON');}};

  function setTab(t){state.activeTab=t;save();render();}
  function takenKey(date,id){return date+'|'+id}
  function isDue(m,date){
    if(!m.enabled) return false;
    if(m.startDate && date<m.startDate) return false;
    if(m.endDate && date>m.endDate) return false;
    return (m.days||[]).includes(dayIndex(date));
  }

  function render(){
    const endCycle = state.cycleDuration !== null 
      ? addDaysIso(state.startDate, (state.cycleUnit === 'weeks' ? state.cycleDuration * 7 : state.cycleDuration) - 1)
      : '∞';
    startText.textContent = `Ciclo: ${fmtFull(parseIso(state.startDate))} — ${endCycle === '∞' ? 'Perpetuo' : fmtFull(parseIso(endCycle))}`;
    $('startDate').value=state.startDate;
    $('cycleDuration').value = state.cycleDuration !== null ? state.cycleDuration : '';
    $('cycleUnit').value=state.cycleUnit;
    tabWeek.classList.toggle('active',state.activeTab==='week');
    tabMeds.classList.toggle('active',state.activeTab==='meds');
    tabHistory.classList.toggle('active',state.activeTab==='history');
    weekPanel.classList.toggle('active',state.activeTab==='week');
    medsPanel.classList.toggle('active',state.activeTab==='meds');
    historyPanel.classList.toggle('active',state.activeTab==='history');
    if(state.activeTab==='week') renderWeek();
    if(state.activeTab==='meds') renderMeds();
    if(state.activeTab==='history') renderHistory();
  }

  function renderWeek(){
    const mon=mondayOf(state.selectedDate);
    const todayIso=isoLocal(new Date());
    weekRange.innerHTML=`${fmtShort(mon)} — ${fmtShort(addDays(mon,6))} ${todayIso>=isoLocal(mon)&&todayIso<=isoLocal(addDays(mon,6))?'<small>(corrente)</small>':''}`;
    daysEl.innerHTML='';
    for(let i=0;i<7;i++){
      const d=addDays(mon,i), iso=isoLocal(d);
      const b=document.createElement('button');
      b.className='daychip'+(iso===state.selectedDate?' active':'')+(iso===todayIso?' today':'');
      b.innerHTML=`<span class="dn">${dayShort[i]}</span><span class="dd">${d.getDate()}</span>`;
      b.onclick=()=>{state.selectedDate=iso;save();renderWeek();};
      daysEl.appendChild(b);
    }
    dayTitle.innerHTML=`${dayNames[dayIndex(state.selectedDate)]} <span>${fmtFull(parseIso(state.selectedDate))}</span>`;
    const c=diffDays(state.selectedDate,state.startDate)+1;
    const totalDays = state.cycleDuration !== null ? (state.cycleUnit === 'weeks' ? state.cycleDuration * 7 : state.cycleDuration) : Infinity;
    cycleText.textContent = state.cycleDuration === null ? 'Ciclo perpetuo' : (c > 0 && c <= totalDays ? `Giorno ${c} di ${totalDays}` : (c > totalDays ? 'Ciclo terminato' : 'Prima del ciclo'));
    renderSummary();
    sections.innerHTML='';
    slots.forEach(([slot,label])=>{
      const due=state.meds.filter(m=>m.time===slot && isDue(m,state.selectedDate));
      const wrap=document.createElement('section');wrap.className='section';
      wrap.innerHTML=`<h3>${label}</h3>`;
      if(!due.length) wrap.innerHTML+='<div class="empty">Nessun farmaco.</div>';
      due.forEach(m=>wrap.appendChild(card(m)));
      sections.appendChild(wrap);
    });
  }

  function renderSummary(){
    const todayDue = state.meds.filter(m=>isDue(m,state.selectedDate));
    const todayTakenCount = todayDue.filter(m=>!!state.taken[takenKey(state.selectedDate,m.id)]).length;
    const pToday = todayDue.length?Math.round(todayTakenCount/todayDue.length*100):0;
    preseOggiBadge.textContent = `Prese oggi: ${todayTakenCount}/${todayDue.length} (${pToday}%)`;
  }

  function card(m){
    const key=takenKey(state.selectedDate,m.id), done=!!state.taken[key];
    const div=document.createElement('div');div.className='card'+(done?' taken':'');
    div.innerHTML=`<button class="check">${done?'✓':''}</button><div class="txt"><div class="line1"><span class="name"></span><span class="dose"></span></div>${m.note?'<div class="note"></div>':''}</div>`;
    div.querySelector('.name').textContent=m.name; div.querySelector('.dose').textContent=m.dose;
    if(m.note) div.querySelector('.note').textContent=m.note;
    div.onclick=()=>{state.taken[key]=!state.taken[key]; if(!state.taken[key]) delete state.taken[key]; save(); renderWeek();};
    return div;
  }

  function renderMeds(){
    medGrid.innerHTML='';
    if(state.meds.length===0){
      medGrid.innerHTML='<div class="empty">Nessun farmaco inserito. Premi "+ Aggiungi" per crearne uno.</div>';
      return;
    }
    // Raggruppa per nome
    const groups = {};
    state.meds.forEach((m, idx) => {
      if(!groups[m.name]) groups[m.name] = { meds: [], indices: [] };
      groups[m.name].meds.push(m);
      groups[m.name].indices.push(idx);
    });
    Object.keys(groups).forEach(name => {
      const group = groups[name];
      const first = group.meds[0];
      const count = group.meds.length;
      const bg = hashColor(name);
      const div = document.createElement('div');
      div.className = 'med-icon';
      div.style.background = `linear-gradient(135deg, ${bg}, ${bg}dd)`;
      const abbr = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) || name.slice(0,2).toUpperCase();
      // Nome per intero sotto l'icona
      div.innerHTML = `
        <div class="abbr">${abbr}</div>
        <div class="dose-small">${first.dose}</div>
        <div class="count">${count} voci</div>
        <div class="fullname">${name}</div>
      `;
      div.onclick = (e) => {
        e.stopPropagation();
        openEditModal(group.indices[0]);
      };
      medGrid.appendChild(div);
    });
  }

  function renderHistory(){
    const box = $('historyList'); box.innerHTML = '';
    const takenKeys = Object.keys(state.taken).sort().reverse();
    if(takenKeys.length === 0) box.innerHTML = '<div class="empty">Vuoto.</div>';
    takenKeys.forEach(key => {
      const [date, id] = key.split('|');
      const m = state.meds.find(item => item.id === id);
      if(m){
        const div = document.createElement('div'); div.className = 'history-item';
        div.innerHTML = `<div><div class="history-date">${fmtFull(parseIso(date))}</div><div class="history-details">${m.name} - ${m.dose} (${m.time})</div></div><button class="mini" style="color:var(--red)" onclick="removeHistory('${key}')">Elimina</button>`;
        box.appendChild(div);
      }
    });
  }

  window.removeHistory = (key) => { delete state.taken[key]; save(); render(); };
  function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
  render();
})();
</script>

<!-- ============ MODULO FIREBASE ============ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, enableIndexedDbPersistence,
  doc, setDoc, onSnapshot, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSXymQ3y9woYgggq_7rerIpasQK4PMTQo",
  authDomain: "promemoria-4203d.firebaseapp.com",
  projectId: "promemoria-4203d",
  storageBucket: "promemoria-4203d.firebasestorage.app",
  messagingSenderId: "243468925961",
  appId: "1:243468925961:web:aa01c6c17822f9cb83ccd8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "sharedTherapy", "main");

const badge = document.getElementById('syncBadge');
function setBadge(type, text) {
  badge.className = 'sync-badge ' + type;
  badge.textContent = text;
}

try {
  await enableIndexedDbPersistence(db);
} catch(e) {
  console.warn('Persistenza offline non disponibile:', e.code);
}

let ignoreNextSnapshot = false;
let syncTimeout = null;

try {
  const snap = await getDoc(DOC_REF);
  if (snap.exists()) {
    const remote = snap.data();
    if (remote && remote.state) {
      window.__therapy_setState(remote.state);
      setBadge('ok', '🟢 Sincronizzato');
    } else {
      const local = window.__therapy_getState();
      await setDoc(DOC_REF, { state: local, updatedAt: Date.now() });
      setBadge('ok', '🟢 Sincronizzato');
    }
  } else {
    const local = window.__therapy_getState();
    await setDoc(DOC_REF, { state: local, updatedAt: Date.now() });
    setBadge('ok', '🟢 Sincronizzato');
  }
} catch(err) {
  console.error('Errore caricamento iniziale:', err);
  setBadge('err', '⚠️ Offline');
}

onSnapshot(DOC_REF, (snap) => {
  if (ignoreNextSnapshot) {
    ignoreNextSnapshot = false;
    return;
  }
  if (snap.exists() && snap.data().state) {
    window.__therapy_setState(snap.data().state);
    setBadge('ok', '🟢 Sincronizzato');
  }
}, (err) => {
  console.error('Errore listener:', err);
  setBadge('err', '⚠️ Offline');
});

window.__therapy_onChange = function(state) {
  setBadge('syncing', '🔄 Sync...');
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async () => {
    try {
      ignoreNextSnapshot = true;
      await setDoc(DOC_REF, { state: state, updatedAt: Date.now() });
      setBadge('ok', '🟢 Sincronizzato');
    } catch(err) {
      console.error('Errore scrittura:', err);
      setBadge('err', '⚠️ Errore sync');
      ignoreNextSnapshot = false;
    }
  }, 500);
};
</script>
