<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terapia - tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
.header { background: #1976d2; color: white; padding: 20px; text-align: center; }
.header h1 { font-size: 24px; margin-bottom: 8px; }
.sync-status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; margin-top: 8px; }
.sync-ok { background: #4caf50; }
.sync-off { background: #ff9800; }
.sync-err { background: #f44336; }
.tabs { display: flex; background: #e3f2fd; border-bottom: 2px solid #1976d2; }
.tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 500; transition: background 0.2s; }
.tab.active { background: #1976d2; color: white; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }
.card { background: #f9f9f9; border-radius: 8px; padding: 16px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
.card h3 { margin-bottom: 12px; color: #333; }
.stat { display: flex; justify-content: space-between; margin: 8px 0; }
.stat-label { color: #666; }
.stat-value { font-weight: bold; color: #1976d2; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 4px; transition: background 0.2s; }
.btn-primary { background: #1976d2; color: white; }
.btn-primary:hover { background: #1565c0; }
.btn-danger { background: #f44336; color: white; }
.btn-danger:hover { background: #d32f2f; }
.btn-secondary { background: #757575; color: white; }
.btn-secondary:hover { background: #616161; }
.btn-success { background: #4caf50; color: white; }
.btn-success:hover { background: #388e3c; }
input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin: 4px; }
input[type="date"], input[type="number"], input[type="text"] { width: 100%; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: white; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h2 { font-size: 20px; }
.close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
.drug-item { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.dose-item { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.dose-item.taken { background: #e8f5e9; border-color: #4caf50; }
.dose-info { flex: 1; }
.dose-name { font-weight: bold; }
.dose-time { font-size: 12px; color: #666; }
.week-day { display: inline-block; padding: 4px 8px; margin: 2px; border-radius: 4px; background: #e3f2fd; font-size: 12px; }
.empty-state { text-align: center; padding: 40px; color: #999; }
.progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 0.3s; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>💊 Terapia</h1>
    <div id="syncStatus" class="sync-status sync-off">⏳ Connessione...</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="week">Settimana</div>
    <div class="tab" data-tab="drugs">Farmaci</div>
    <div class="tab" data-tab="history">Storico</div>
  </div>

  <!-- Tab Settimana -->
  <div class="tab-content active" id="tab-week">
    <div class="card">
      <h3>📊 Riepilogo</h3>
      <div class="stat">
        <span class="stat-label">Prese oggi</span>
        <span class="stat-value" id="takenToday">0 / 0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Totale settimana</span>
        <span class="stat-value" id="takenWeek">0 / 0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Da prendere oggi</span>
        <span class="stat-value" id="pendingToday">0 voci</span>
      </div>
      <div class="stat">
        <span class="stat-label">Completamento settimana</span>
        <span class="stat-value" id="weekCompletion">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="card">
      <h3>📅 Da prendere oggi</h3>
      <div id="todayDoses"></div>
    </div>
  </div>

  <!-- Tab Farmaci -->
  <div class="tab-content" id="tab-drugs">
    <div class="card">
      <h3>⚙️ Configurazione globale</h3>
      <div class="form-group">
        <label>Data inizio ciclo</label>
        <input type="date" id="globalStartDate">
      </div>
      <div class="form-group">
        <label>Durata ciclo</label>
        <div style="display: flex; gap: 8px;">
          <input type="number" id="globalDuration" value="30" min="1">
          <select id="globalDurationUnit">
            <option value="days">Giorni</option>

          </select>

      </div>
      <button class="btn btn-primary" onclick="saveGlobalConfig()">💾 Salva configurazione</button>
    </div>

    <div class="card">

      <div id="drugList" style="margin-top: 16px;"></div>
    </div>

    <div class="card">
      <h3>🔧 Strumenti</h3>
      <button class="btn btn-secondary" onclick="exportJSON()">⬇️ Export JSON</button>
      <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">⬆️ Import JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="btn btn-danger" onclick="resetData()">🗑️ Reset dati</button>
    </div>
  </div>

  <!-- Tab Storico -->
  <div class="tab-content" id="tab-history">
    <div class="card">
      <h3>📜 Database storico somministrazioni</h3>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<!-- Modal Nuovo Farmaco -->

  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Nuovo Farmaco</h2>
      <button class="close-btn" onclick="closeDrugModal()">&times;</button>
    </div>
    <form id="drugForm" onsubmit="saveDrug(event)">
      <div class="form-group">

        <input type="text" id="drugName" required>
      </div>
      <div class="form-group">
        <label>Data Inizio *</label>
        <input type="date" id="drugStartDate" required>
      </div>
      <div class="form-group">
        <label>Data Fine (opzionale)</label>
        <input type="date" id="drugEndDate">
      </div>
      <div class="form-group">
        <label>Dose Totale Iniziale (es. 1g) *</label>
        <input type="text" id="drugDose" placeholder="es. 1g" required>
      </div>
      <div class="form-group">
        <label>Operazione Rampa</label>

          <input type="number" id="drugDuration" value="30" min="1">
          <select id="drugDurationUnit">

          <label><input type="checkbox" class="weekDay" value="3"> Mer</label>
          <label><input type="checkbox" class="weekDay" value="4"> Gio</label>
          <label><input type="checkbox" class="weekDay" value="5"> Ven</label>
          <label><input type="checkbox" class="weekDay" value="6"> Sab</label>
          <label><input type="checkbox" class="weekDay" value="0"> Dom</label>
        </div>
      </div>
      <div class="form-group">
        <label>Suddivisione giornata (dose totale divisa tra questi)</label>
        <div style="display: flex; gap: 8px;">
          <label>Mattina <input type="number" id="drugMorning" value="0" min="0" style="width: 60px;"></label>
          <label>Pomeriggio <input type="number" id="drugAfternoon" value="0" min="0" style="width: 60px;"></label>
          <label>Sera <input type="number" id="drugEvening" value="0" min="0" style="width: 60px;"></label>
        </div>

        <button type="button" class="btn btn-secondary" onclick="closeDrugModal()">Annulla</button>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, enableIndexedDbPersistence,
  collection, doc, setDoc, deleteDoc, onSnapshot, getDocs, updateDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSXymQ3y9woYgggq_7rerIpasQK4PMTQo",
  authDomain: "promemoria-4203d.firebaseapp.com",
  projectId: "promemoria-4203d",
  storageBucket: "promemoria-4203d.firebasestorage.app",
  messagingSenderId: "243468925961",
  appId: "1:243468925961:web:aa01c6c17822f9cb83ccd8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Abilita persistenza offline
enableIndexedDbPersistence(db).catch((err) => {
  console.warn('Persistenza offline non disponibile:', err.code);
});

// Stato globale
let APP_CONFIG = null;
let APP_DRUGS = [];
let APP_DOSES = [];
let editingDrugId = null;

// ---------- SYNC STATUS ----------
function setSyncStatus(type, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status sync-' + type;
  el.textContent = msg;
}

// ---------- LISTENERS REAL-TIME ----------
// Config globale
onSnapshot(doc(db, 'sharedTherapy', 'config'), (snap) => {
  if (snap.exists()) {
    APP_CONFIG = snap.data();
    document.getElementById('globalStartDate').value = APP_CONFIG.startDate || '';
    document.getElementById('globalDuration').value = APP_CONFIG.duration?.value || 30;
    document.getElementById('globalDurationUnit').value = APP_CONFIG.duration?.unit || 'days';
    setSyncStatus('ok', '🟢 Connesso');
    renderAll();
  } else {
    setSyncStatus('ok', '🟢 Pronto');
  }
}, (err) => {
  console.error('Errore config:', err);
  setSyncStatus('err', '⚠️ Offline');
});

// Farmaci
onSnapshot(collection(db, 'sharedTherapy', 'drugs'), (snap) => {
  APP_DRUGS = [];
  snap.forEach(d => APP_DRUGS.push({ id: d.id, ...d.data() }));
  renderAll();
}, (err) => {
  console.error('Errore drugs:', err);
});

// Storico dosi
onSnapshot(collection(db, 'sharedTherapy', 'doses'), (snap) => {
  APP_DOSES = [];
  snap.forEach(d => APP_DOSES.push({ id: d.id, ...d.data() }));
  renderAll();
}, (err) => {
  console.error('Errore doses:', err);
});

// ---------- SAVE OPERATIONS ----------
window.saveGlobalConfig = async () => {
  const config = {
    startDate: document.getElementById('globalStartDate').value,
    duration: {
      value: +document.getElementById('globalDuration').value,
      unit: document.getElementById('globalDurationUnit').value
    },
    updatedAt: Date.now()
  };
  await setDoc(doc(db, 'sharedTherapy', 'config'), config);
  alert('✅ Configurazione salvata');
};

window.openDrugModal = (drugId = null) => {
  editingDrugId = drugId;
  const modal = document.getElementById('drugModal');
  const form = document.getElementById('drugForm');
  form.reset();
  
  if (drugId) {
    const drug = APP_DRUGS.find(d => d.id === drugId);
    if (drug) {
      document.getElementById('modalTitle').textContent = 'Modifica Farmaco';
      document.getElementById('drugName').value = drug.name || '';
      document.getElementById('drugStartDate').value = drug.startDate || '';
      document.getElementById('drugEndDate').value = drug.endDate || '';
      document.getElementById('drugDose').value = drug.initialDose || '';
      document.getElementById('drugRampOp').value = drug.rampOperation || 'none';
      document.getElementById('drugRampDelta').value = drug.rampDelta || '';
      document.getElementById('drugRampLimit').value = drug.rampLimit || '';
      document.getElementById('drugRampFreq').value = drug.rampFrequencyDays || 7;
      document.getElementById('drugDuration').value = drug.durationIfNoEnd?.value || 30;
      document.getElementById('drugDurationUnit').value = drug.durationIfNoEnd?.unit || 'days';
      document.getElementById('drugMorning').value = drug.daySplits?.morning || 0;
      document.getElementById('drugAfternoon').value = drug.daySplits?.afternoon || 0;
      document.getElementById('drugEvening').value = drug.daySplits?.evening || 0;
      
      // Set week days
      document.querySelectorAll('.weekDay').forEach(cb => {
        cb.checked = (drug.weekDays || []).includes(+cb.value);
      });
    }
  } else {
    document.getElementById('modalTitle').textContent = 'Nuovo Farmaco';
    document.getElementById('drugStartDate').value = new Date().toISOString().split('T')[0];
  }
  
  modal.classList.add('active');
};

window.closeDrugModal = () => {
  document.getElementById('drugModal').classList.remove('active');
  editingDrugId = null;
};

window.saveDrug = async (e) => {
  e.preventDefault();
  
  const weekDays = [];
  document.querySelectorAll('.weekDay:checked').forEach(cb => weekDays.push(+cb.value));
  
  const drug = {
    name: document.getElementById('drugName').value,
    startDate: document.getElementById('drugStartDate').value,
    endDate: document.getElementById('drugEndDate').value,
    initialDose: document.getElementById('drugDose').value,
    rampOperation: document.getElementById('drugRampOp').value,
    rampDelta: document.getElementById('drugRampDelta').value,
    rampLimit: document.getElementById('drugRampLimit').value,
    rampFrequencyDays: +document.getElementById('drugRampFreq').value,
    durationIfNoEnd: {
      value: +document.getElementById('drugDuration').value,
      unit: document.getElementById('drugDurationUnit').value
    },
    weekDays: weekDays,
    daySplits: {
      morning: +document.getElementById('drugMorning').value,
      afternoon: +document.getElementById('drugAfternoon').value,
      evening: +document.getElementById('drugEvening').value
    },
    updatedAt: Date.now()
  };
  
  const drugId = editingDrugId || crypto.randomUUID();
  await setDoc(doc(db, 'sharedTherapy', 'drugs', drugId), drug);
  closeDrugModal();
};

window.deleteDrug = async (drugId) => {
  if (!confirm('Eliminare questo farmaco e tutto il suo storico?')) return;
  await deleteDoc(doc(db, 'sharedTherapy', 'drugs', drugId));
  
  // Elimina dosi collegate
  const snap = await getDocs(collection(db, 'sharedTherapy', 'doses'));
  for (const d of snap.docs) {
    if (d.data().drugId === drugId) {
      await deleteDoc(d.ref);
    }
  }
};

window.markDoseTaken = async (doseId) => {
  await updateDoc(doc(db, 'sharedTherapy', 'doses', doseId), {
    status: 'taken',
    takenAt: Date.now()
  });
};

window.markDosePending = async (doseId) => {
  await updateDoc(doc(db, 'sharedTherapy', 'doses', doseId), {
    status: 'pending',
    takenAt: null
  });
};

window.exportJSON = () => {
  const data = {
    config: APP_CONFIG,
    drugs: APP_DRUGS,
    doses: APP_DOSES,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `therapy-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

window.importJSON = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  const text = await file.text();
  const data = JSON.parse(text);
  
  if (!confirm('Sovrascrivere tutti i dati attuali?')) return;
  
  if (data.config) {
    await setDoc(doc(db, 'sharedTherapy', 'config'), data.config);
  }
  
  if (data.drugs) {
    for (const drug of data.drugs) {
      await setDoc(doc(db, 'sharedTherapy', 'drugs', drug.id || crypto.randomUUID()), drug);
    }
  }
  
  if (data.doses) {
    for (const dose of data.doses) {
      await setDoc(doc(db, 'sharedTherapy', 'doses', dose.id || crypto.randomUUID()), dose);
    }
  }
  
  alert('✅ Import completato');
  e.target.value = '';
};

window.resetData = async () => {
  if (!confirm('⚠️ Eliminare TUTTI i dati? Questa azione è irreversibile!')) return;
  if (!confirm('Sei davvero sicuro?')) return;
  
  // Elimina config
  await deleteDoc(doc(db, 'sharedTherapy', 'config'));
  
  // Elimina farmaci
  const drugsSnap = await getDocs(collection(db, 'sharedTherapy', 'drugs'));
  for (const d of drugsSnap.docs) {
    await deleteDoc(d.ref);
  }
  
  // Elimina dosi
  const dosesSnap = await getDocs(collection(db, 'sharedTherapy', 'doses'));
  for (const d of dosesSnap.docs) {
    await deleteDoc(d.ref);
  }
  
  alert('✅ Dati eliminati');
};

// ---------- LOGICA CALCOLO DOSI ----------
function parseDose(doseStr) {
  if (!doseStr) return { value: 0, unit: '' };
  const match = doseStr.match(/^([\d.,]+)\s*(.*)$/);
  if (!match) return { value: 0, unit: doseStr };
  return {
    value: parseFloat(match[1].replace(',', '.')),
    unit: match[2].trim()
  };
}

function calculateCurrentDose(drug, date) {
  if (drug.rampOperation === 'none' || !drug.rampDelta) {
    return drug.initialDose;
  }
  
  const startDate = new Date(drug.startDate);
  const currentDate = new Date(date);
  const daysDiff = Math.floor((currentDate - startDate) / (1000 * 60 * 60 * 24));
  const rampCycles = Math.floor(daysDiff / drug.rampFrequencyDays);
  
  if (rampCycles === 0) return drug.initialDose;
  
  const initial = parseDose(drug.initialDose);
  const delta = parseDose(drug.rampDelta);
  
  let currentValue = initial.value;
  for (let i = 0; i < rampCycles; i++) {
    if (drug.rampOperation === '+') {
      currentValue += delta.value;
    } else if (drug.rampOperation === '-') {
      currentValue -= delta.value;
    }
    
    // Check limit
    if (drug.rampLimit) {
      const limit = parseDose(drug.rampLimit);
      if (drug.rampOperation === '+' && currentValue >= limit.value) {
        currentValue = limit.value;
        break;
      }
      if (drug.rampOperation === '-' && currentValue <= limit.value) {
        currentValue = limit.value;
        break;
      }
    }
  }
  
  return `${currentValue}${initial.unit}`;
}

function generateDosesForDate(drug, date) {
  const dateObj = new Date(date);
  const dayOfWeek = dateObj.getDay();
  
  // Check if drug is active on this date
  const startDate = new Date(drug.startDate);
  const endDate = drug.endDate ? new Date(drug.endDate) : null;
  
  if (dateObj < startDate) return [];
  if (endDate && dateObj > endDate) return [];
  
  // Check if drug is active on this day of week
  if (!drug.weekDays.includes(dayOfWeek)) return [];
  
  const totalDose = calculateCurrentDose(drug, date);
  const total = parseDose(totalDose);
  const splits = drug.daySplits;
  const totalSplits = splits.morning + splits.afternoon + splits.evening;
  
  if (totalSplits === 0) return [];
  
  const doses = [];
  const times = [
    { key: 'morning', hour: 8, count: splits.morning },
    { key: 'afternoon', hour: 14, count: splits.afternoon },
    { key: 'evening', hour: 20, count: splits.evening }
  ];
  
  for (const time of times) {
    if (time.count > 0) {
      const doseValue = (total.value * time.count) / totalSplits;
      const scheduledAt = new Date(dateObj);
      scheduledAt.setHours(time.hour, 0, 0, 0);
      
      doses.push({
        drugId: drug.id,
        drugName: drug.name,
        scheduledAt: scheduledAt.getTime(),
        doseAmount: `${doseValue}${total.unit}`,
        status: 'pending'
      });
    }
  }
  
  return doses;
}

function getWeekDates() {
  const today = new Date();
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function renderAll() {
  renderDrugs();
  renderToday();
  renderHistory();
}

function renderDrugs() {
  const list = document.getElementById('drugList');
  if (APP_DRUGS.length === 0) {
    list.innerHTML = '<div class="empty-state">Nessun farmaco configurato</div>';
    return;
  }
  
  list.innerHTML = APP_DRUGS.map(drug => `
    <div class="drug-item">
      <div>
        <strong>${drug.name}</strong><br>
        <small>${drug.initialDose} • ${drug.weekDays.map(d => ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'][d]).join(', ')}</small>
      </div>
      <div>
        <button class="btn btn-secondary" onclick="openDrugModal('${drug.id}')">✏️ Modifica</button>
        <button class="btn btn-danger" onclick="deleteDrug('${drug.id}')">🗑️ Elimina</button>
      </div>
    </div>
  `).join('');
}

function renderToday() {
  const today = new Date().toISOString().split('T')[0];
  const allDoses = [];
  
  for (const drug of APP_DRUGS) {
    const doses = generateDosesForDate(drug, today);
    allDoses.push(...doses);
  }
  
  // Match with existing doses in DB
  const todayDoses = allDoses.map(dose => {
    const existing = APP_DOSES.find(d => 
      d.drugId === dose.drugId && 
      d.scheduledAt === dose.scheduledAt
    );
    return existing || dose;
  });
  
  // Auto-create missing doses in DB
  for (const dose of todayDoses) {
    if (!dose.id) {
      const doseId = crypto.randomUUID();
      setDoc(doc(db, 'sharedTherapy', 'doses', doseId), {
        ...dose,
        id: doseId,
        createdAt: Date.now()
      });
    }
  }
  
  const taken = todayDoses.filter(d => d.status === 'taken').length;
  const total = todayDoses.length;
  const pending = total - taken;
  
  document.getElementById('takenToday').textContent = `${taken} / ${total}`;
  document.getElementById('pendingToday').textContent = `${pending} voci`;
  
  const container = document.getElementById('todayDoses');
  if (todayDoses.length === 0) {
    container.innerHTML = '<div class="empty-state">Nessuna dose prevista oggi</div>';
  } else {
    container.innerHTML = todayDoses
      .sort((a, b) => a.scheduledAt - b.scheduledAt)
      .map(dose => {
        const time = new Date(dose.scheduledAt).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        const isTaken = dose.status === 'taken';
        return `
          <div class="dose-item ${isTaken ? 'taken' : ''}">
            <div class="dose-info">
              <div class="dose-name">${dose.drugName}</div>
              <div class="dose-time">${time} • ${dose.doseAmount}</div>
            </div>
            <button class="btn ${isTaken ? 'btn-secondary' : 'btn-success'}" 
                    onclick="${isTaken ? `markDosePending('${dose.id}')` : `markDoseTaken('${dose.id}')`}">
              ${isTaken ? '↩️ Annulla' : '✓ Presa'}
            </button>
          </div>
        `;
      }).join('');
  }
  
  // Week stats
  const weekDates = getWeekDates();
  let weekTaken = 0;
  let weekTotal = 0;
  
  for (const date of weekDates) {
    for (const drug of APP_DRUGS) {
      const doses = generateDosesForDate(drug, date);
      weekTotal += doses.length;
      
      for (const dose of doses) {
        const existing = APP_DOSES.find(d => 
          d.drugId === dose.drugId && 
          d.scheduledAt === dose.scheduledAt &&
          d.status === 'taken'
        );
        if (existing) weekTaken++;
      }
    }
  }
  
  document.getElementById('takenWeek').textContent = `${weekTaken} / ${weekTotal}`;
  const completion = weekTotal > 0 ? Math.round((weekTaken / weekTotal) * 100) : 0;
  document.getElementById('weekCompletion').textContent = `${completion}%`;
  document.getElementById('progressFill').style.width = `${completion}%`;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const takenDoses = APP_DOSES
    .filter(d => d.status === 'taken')
    .sort((a, b) => b.takenAt - a.takenAt);
  
  if (takenDoses.length === 0) {
    list.innerHTML = '<div class="empty-state">Nessuna somministrazione registrata</div>';
    return;
  }
  
  list.innerHTML = takenDoses.map(dose => {
    const date = new Date(dose.takenAt).toLocaleString('it-IT');
    return `
      <div class="dose-item taken">
        <div class="dose-info">
          <div class="dose-name">${dose.drugName}</div>
          <div class="dose-time">${date} • ${dose.doseAmount}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ---------- TABS ----------
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// Initial render
setSyncStatus('off', '⏳ Connessione...');
</script>
